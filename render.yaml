services:
  # ─── Backend API ────────────────────────────────────────────────────────────
  - type: web
    name: iptv-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install --include=dev && npm run db:generate && npm run build
    startCommand: npx prisma db push --accept-data-loss && npm run db:seed && npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_URL
        fromDatabase:
          name: iptv-db
          property: connectionString
      - key: ACCESS_TOKEN_SECRET
        generateValue: true
      - key: REFRESH_TOKEN_SECRET
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRES_IN
        value: 15m
      - key: REFRESH_TOKEN_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        value: https://iptv-web-wbr1.onrender.com
      - key: LOG_LEVEL
        value: info
      - key: SYNC_INTERVAL_MS
        value: 3600000

  # ─── Web Frontend ────────────────────────────────────────────────────────────
  - type: web
    name: iptv-web
    env: node
    plan: free
    rootDir: web
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_BASE_URL
        value: https://iptv-backend.onrender.com/api/v1
      - key: NEXT_PUBLIC_WS_BASE_URL
        value: https://iptv-backend.onrender.com
      - key: NEXT_PUBLIC_SITE_URL
        value: https://iptv-web-wbr1.onrender.com

databases:
  - name: iptv-db
    plan: free
    postgresMajorVersion: 15
